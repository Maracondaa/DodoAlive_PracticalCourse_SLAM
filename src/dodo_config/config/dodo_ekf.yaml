ekf_filter_node:
  ros__parameters:
    map_frame: 'map'
    odom_frame: 'odom'
    base_link_frame: 'base_link'
    world_frame: 'odom'

    frequency: 30.0
    two_d_mode: false
    publish_tf: true
    transform_timeout: 0.1

    print_diagnostics: true
    
    # Sensor 0: RealSense D435i Visual Odometry
    odom0: /odometry/visual
    odom0_config: [
      # Position (x, y, z)
      true, true, true,
      # Orientation (roll, pitch, yaw)
      false, false, true,
      # Linear Velocity (vx, vy, vz)
      false, false, false,
      # Angular Velocity (vroll, vpitch, vyaw)
      false, false, false,
      # Linear Acceleration (ax, ay, az)
      false, false, false
    ]
    odom0_differential: false
    odom0_relative: false
    odom0_queue_size: 10

    odom0_pose_rejection_threshold: 5.0
    odom0_twist_rejection_threshold: 2.0

    # Sensor 1: Nicla Sense Me IMU
    imu0: /nicla/imu
    imu0_config: [
      # Position (x, y, z)
      false, false, false,
      # Orientation (roll, pitch, yaw)
      true, true, false,
      # Linear Velocity: (vx, vy, vz)
      false, false, false,
      # Angular Velocity (vroll, vpitch, vyaw)
      true, true, true,
      # Linear Acceleration (ax, ay, az)
      false, false, false
    ]
    imu0_differential: false
    imu0_relative: false
    imu0_queue_size: 50
    imu0_remove_gravitational_acceleration: true

    # Sensor 2: RealSense D435i IMU
    # Disabled for now
    imu1: /camera/realsense/imu
    imu1_config: [
      # Position (x, y, z)
      false, false, false,
      # Orientation (roll, pitch, yaw)
      false, false, false,
      # Linear Velocity: (vx, vy, vz)
      false, false, false,
      # Angular Velocity (vroll, vpitch, vyaw)
      false, false, false,
      # Linear Acceleration (ax, ay, az)
      false, false, false
    ]
    imu1_differential: false
    imu1_relative: false
    imu1_queue_size: 50
    imu1_remove_gravitational_acceleration: true
